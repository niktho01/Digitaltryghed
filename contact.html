<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt Os | Digital Tryghed</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="subpage">
    <nav class="v3-nav">
        <a href="index.html" class="logo">
            <div class="logo-dot"></div>
            <span>Digital Tryghed</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Udforsk</a>
            <a href="learning.html">Læring</a>
            <a href="contact.html" class="active">Kontakt</a>
            <a href="index.html" class="nav-cta">Start Rejsen</a>
        </div>
    </nav>

    <main class="contact-main">
        <section class="contact-hero container">
            <div class="contact-card">
                <div class="tag">KONTAKT OS</div>
                <h1>Har du spørgsmål? <br><span>Vi sidder klar.</span></h1>
                <p>Udfyld formularen herunder, eller send os en direkte besked. Vi bestræber os på at svare indenfor 24 timer.</p>
                
                <form id="contact-form" class="pure-form">
                    <div class="form-group-row">
                        <div class="form-group">
                            <label for="name">Navn</label>
                            <input type="text" id="name" placeholder="Dit navn" required>
                        </div>
                        <div class="form-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" placeholder="din@email.dk" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="subject">Emne</label>
                        <select id="subject">
                            <option value="general">Generelt spørgsmål</option>
                            <option value="technical">Teknisk support</option>
                            <option value="feedback">Feedback til spillet</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Besked</label>
                        <textarea id="message" rows="5" placeholder="Hvad kan vi hjælpe med?" required></textarea>
                    </div>
                    <button type="submit" class="btn-main full-width">Send Besked ➔</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="v3-footer">
        <div class="container">
            <p>&copy; 2026 Digital Tryghed. Skabt med fokus på tryghed.</p>
        </div>
    </footer>

</body>
</html>
